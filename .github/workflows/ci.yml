# ─── Exotel Hub — GitHub Actions CI ──────────────────────────────────────────
# Runs on every push to main: type-check → build → deploy to gh-pages branch
# GitHub Pages must be set to: Source → Deploy from a branch → gh-pages / root
# ─────────────────────────────────────────────────────────────────────────────

name: CI — Build & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Type-check, Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push to gh-pages branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build
        env:
          VITE_GEMINI_API_KEY:   ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_ADMIN_EMAILS:     ${{ secrets.VITE_ADMIN_EMAILS }}

      # Deploy dist/ to the gh-pages branch (creates it if needed)
      # GitHub Pages must be configured: Settings → Pages → gh-pages / root
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
